name: Discord active development

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  announce:
    if: github.run_attempt == 1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish approved Linear project digest
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          DISCORD_KNOWN_ISSUES_WEBHOOK_URL: ${{ secrets.DISCORD_KNOWN_ISSUES_WEBHOOK_URL }}
        run: python .github/scripts/discord_communications.py development
