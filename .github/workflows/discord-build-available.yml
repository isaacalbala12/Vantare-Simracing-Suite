name: Discord public beta changelog

on:
  workflow_dispatch:
    inputs:
      version: {description: "Versión de la build", required: true, type: string}
      release_tag: {description: "Tag de la GitHub Release", required: false, type: string}
      download_url: {description: "Descarga directa si no se usa release_tag", required: false, type: string}
      notes: {description: "Resumen de la build", required: false, type: string}
      sha256: {description: "SHA-256 opcional", required: false, type: string}

permissions:
  contents: read

jobs:
  announce:
    if: github.run_attempt == 1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release metadata
        id: metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          MANUAL_URL: ${{ inputs.download_url }}
          MANUAL_SHA: ${{ inputs.sha256 }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          python - <<'PY'
          import json, os, re, subprocess, urllib.request
          tag, url, sha = os.getenv("RELEASE_TAG", "").strip(), os.getenv("MANUAL_URL", "").strip(), os.getenv("MANUAL_SHA", "").strip()
          release_url = ""
          if tag:
              data = json.loads(subprocess.run(["gh", "release", "view", tag, "--repo", os.environ["REPOSITORY"], "--json", "assets"], capture_output=True, text=True, check=True).stdout)
              assets = data.get("assets", [])
              installer = next((a for a in assets if a.get("name") == "vantare-amd64-installer.exe"), None)
              checksum = next((a for a in assets if a.get("name") == "vantare-amd64-installer.exe.sha256"), None)
              if not installer or not checksum: raise SystemExit("Release assets are incomplete")
              url = url or installer.get("browserDownloadUrl") or installer.get("url", "")
              if not sha:
                  with urllib.request.urlopen(checksum.get("browserDownloadUrl") or checksum.get("url"), timeout=30) as response:
                      sha = response.read().decode("utf-8").strip().split()[0]
              release_url = f"{os.environ['SERVER_URL']}/{os.environ['REPOSITORY']}/releases/tag/{tag}"
          if not url: raise SystemExit("release_tag or download_url is required")
          if sha and not re.fullmatch(r"[0-9a-fA-F]{64}", sha): raise SystemExit("Invalid SHA-256")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"download_url={url}\nsha256={sha.lower()}\nrelease_url={release_url}\n")
          PY

      - name: Build accessible payload and HTML card
        env:
          NOTES: ${{ inputs.notes }}
        run: |
          repo_url="${{ github.server_url }}/${{ github.repository }}"
          python .github/scripts/discord_communications.py build --dry-run \
            --version "${{ inputs.version }}" --notes "$NOTES" \
            --download-url "${{ steps.metadata.outputs.download_url }}" --sha256 "${{ steps.metadata.outputs.sha256 }}" \
            --release-url "${{ steps.metadata.outputs.release_url }}" \
            --known-issues-url "$repo_url/blob/master/vantare-v2/docs/tester-known-issues.md" \
            --html-output "$RUNNER_TEMP/vantare-build.html" > "$RUNNER_TEMP/build-payload-preview.json"

      - name: render-discord-card
        run: |
          command -v google-chrome >/dev/null 2>&1 || { echo "::error::google-chrome is required"; exit 1; }
          google-chrome --headless=new --disable-gpu --no-sandbox --hide-scrollbars --window-size=1200,630 \
            --screenshot="$RUNNER_TEMP/vantare-build.png" "file://$RUNNER_TEMP/vantare-build.html"
          test -s "$RUNNER_TEMP/vantare-build.png"

      - name: Publish build card and accessible changelog
        env:
          DISCORD_BUILD_WEBHOOK_URL: ${{ secrets.DISCORD_BUILD_WEBHOOK_URL }}
          NOTES: ${{ inputs.notes }}
        run: |
          repo_url="${{ github.server_url }}/${{ github.repository }}"
          python .github/scripts/discord_communications.py build \
            --version "${{ inputs.version }}" --notes "$NOTES" \
            --download-url "${{ steps.metadata.outputs.download_url }}" --sha256 "${{ steps.metadata.outputs.sha256 }}" \
            --release-url "${{ steps.metadata.outputs.release_url }}" \
            --known-issues-url "$repo_url/blob/master/vantare-v2/docs/tester-known-issues.md" \
            --image "$RUNNER_TEMP/vantare-build.png"
