name: Discord release announcement

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to announce, for example v0.3.10.0"
        required: true
        type: string

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish changelog section to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_SERVER_URL_VALUE: ${{ github.server_url }}
          GITHUB_REPOSITORY_VALUE: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import sys
          import textwrap
          import urllib.request

          webhook = os.environ.get("DISCORD_WEBHOOK_URL", "").strip()
          if not webhook:
              print("DISCORD_WEBHOOK_URL secret is not configured", file=sys.stderr)
              sys.exit(1)

          tag = (os.environ.get("INPUT_TAG") or os.environ.get("REF_NAME") or "").strip()
          if not tag:
              print("No tag provided by workflow_dispatch or github.ref_name", file=sys.stderr)
              sys.exit(1)

          changelog_path = "vantare-v2/docs/changelog.md"
          with open(changelog_path, "r", encoding="utf-8") as fh:
              changelog = fh.read()

          pattern = re.compile(
              rf"^##\s+{re.escape(tag)}\s*$([\s\S]*?)(?=^##\s+v|\Z)",
              re.MULTILINE,
          )
          match = pattern.search(changelog)
          if not match:
              print(f"Could not find changelog section for {tag}", file=sys.stderr)
              sys.exit(1)

          section = match.group(1).strip()
          if not section:
              print(f"Changelog section for {tag} is empty", file=sys.stderr)
              sys.exit(1)

          repo_url = f"{os.environ['GITHUB_SERVER_URL_VALUE']}/{os.environ['GITHUB_REPOSITORY_VALUE']}"
          tag_url = f"{repo_url}/releases/tag/{tag}"
          sha = os.environ.get("GITHUB_SHA_VALUE", "")[:7]

          header = f"**Vantare {tag}**\n{tag_url}\nCommit: `{sha}`\n\n"
          content = header + section

          # Discord message content limit is 2000 chars. Split on paragraph
          # boundaries so long changelogs still publish instead of failing.
          chunks = []
          current = ""
          for paragraph in content.split("\n\n"):
              candidate = paragraph if not current else current + "\n\n" + paragraph
              if len(candidate) <= 1900:
                  current = candidate
                  continue
              if current:
                  chunks.append(current)
              if len(paragraph) <= 1900:
                  current = paragraph
              else:
                  chunks.extend(textwrap.wrap(paragraph, 1900, replace_whitespace=False))
                  current = ""
          if current:
              chunks.append(current)

          for index, chunk in enumerate(chunks, start=1):
              suffix = f"\n\n({index}/{len(chunks)})" if len(chunks) > 1 else ""
              payload = json.dumps({"content": chunk + suffix}).encode("utf-8")
              req = urllib.request.Request(
                  webhook,
                  data=payload,
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=20) as resp:
                  if resp.status >= 300:
                      raise RuntimeError(f"Discord webhook failed with status {resp.status}")

          print(f"Published changelog for {tag} to Discord")
          PY
