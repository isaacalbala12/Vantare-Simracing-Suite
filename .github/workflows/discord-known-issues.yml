name: Discord known issues

on:
  push:
    paths:
      - "vantare-v2/docs/tester-known-issues.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Warn on rerun to avoid duplicate Discord messages
        if: github.run_attempt > 1
        run: |
          echo "::warning::Skipping Discord known issues because this is a rerun (run_attempt=${{ github.run_attempt }}). To re-announce, trigger a fresh workflow_dispatch."

      - name: Checkout repository
        if: github.run_attempt == 1
        uses: actions/checkout@v4

      - name: Publish known issues to Discord
        if: github.run_attempt == 1
        env:
          DISCORD_KNOWN_ISSUES_WEBHOOK_URL: ${{ secrets.DISCORD_KNOWN_ISSUES_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_SERVER_URL_VALUE: ${{ github.server_url }}
          GITHUB_REPOSITORY_VALUE: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import sys
          import textwrap
          import time
          import urllib.error
          import urllib.request

          def send_to_discord(webhook, payload_dict):
              """Validate payload and POST to Discord with 429 retry and 403 handling."""
              payload_str = json.dumps(payload_dict)
              # Validate JSON roundtrip before sending
              json.loads(payload_str)

              data = payload_str.encode("utf-8")
              req = urllib.request.Request(
                  webhook,
                  data=data,
                  headers={
                      "Content-Type": "application/json",
                      "User-Agent": "GitHub-Actions-Discord-Announcer",
                  },
                  method="POST",
              )

              def do_request(attempt):
                  try:
                      with urllib.request.urlopen(req, timeout=20) as resp:
                          if resp.status >= 300:
                              raise RuntimeError(f"Discord webhook failed with status {resp.status}")
                          return resp
                  except urllib.error.HTTPError as e:
                      if e.code == 429 and attempt == 1:
                          retry_after = e.headers.get("Retry-After")
                          wait = int(retry_after) if retry_after and retry_after.isdigit() else 5
                          print(f"Discord rate limited (429). Retrying after {wait}s...", file=sys.stderr)
                          time.sleep(wait)
                          return do_request(attempt + 1)
                      if e.code == 403:
                          print("Discord webhook rejected the request (403). Verify the webhook URL secret is correct and the webhook has not been deleted.", file=sys.stderr)
                          sys.exit(1)
                      raise RuntimeError(f"Discord webhook failed with status {e.code}: {e.reason}")
                  except urllib.error.URLError as e:
                      raise RuntimeError(f"Discord webhook request failed: {e.reason}")

              return do_request(1)

          webhook = (os.environ.get("DISCORD_KNOWN_ISSUES_WEBHOOK_URL") or os.environ.get("DISCORD_WEBHOOK_URL") or "").strip()
          if not webhook:
              print("Neither DISCORD_KNOWN_ISSUES_WEBHOOK_URL nor DISCORD_WEBHOOK_URL secret is configured", file=sys.stderr)
              sys.exit(1)

          known_issues_path = "vantare-v2/docs/tester-known-issues.md"
          if not os.path.exists(known_issues_path):
              print(f"Error: {known_issues_path} does not exist", file=sys.stderr)
              sys.exit(1)

          with open(known_issues_path, "r", encoding="utf-8") as fh:
              content = fh.read()

          # Extraer versión del documento
          version_match = re.search(r"en la versión\s+\*\*([^\*]+)\*\*", content)
          version_doc = version_match.group(1).strip() if version_match else "Desconocida"

          # Extraer bloqueantes
          bloqueantes_match = re.search(r"###\s+🔴\s+Bloqueantes\s*\n+([\s\S]*?)(?=\n###|\n##|\Z)", content)
          bloqueantes = bloqueantes_match.group(1).strip() if bloqueantes_match else "Ninguno detectado"

          # Extraer importantes
          importantes_match = re.search(r"###\s+🟡\s+Importantes\s*\n+([\s\S]*?)(?=\n###|\n##|\Z)", content)
          importantes = importantes_match.group(1).strip() if importantes_match else "Ninguno detectado"

          repo_url = f"{os.environ['GITHUB_SERVER_URL_VALUE']}/{os.environ['GITHUB_REPOSITORY_VALUE']}"
          sha = os.environ.get("GITHUB_SHA_VALUE", "")[:7]
          doc_url = f"{repo_url}/blob/main/vantare-v2/docs/tester-known-issues.md"

          message = (
              "**Vantare known issues updated**\n\n"
              f"Version: `{version_doc}`\n\n"
              "**🔴 Bloqueantes**\n"
              f"{bloqueantes}\n\n"
              "**🟡 Importantes**\n"
              f"{importantes}\n\n"
              f"Documento completo: {doc_url}\n"
              f"Commit: [`{sha}`]({repo_url}/commit/{sha})"
          )

          # Dividir si excede 1900 caracteres
          chunks = []
          current = ""
          for paragraph in message.split("\n\n"):
              candidate = paragraph if not current else current + "\n\n" + paragraph
              if len(candidate) <= 1900:
                  current = candidate
                  continue
              if current:
                  chunks.append(current)
              if len(paragraph) <= 1900:
                  current = paragraph
              else:
                  chunks.extend(textwrap.wrap(paragraph, 1900, replace_whitespace=False))
                  current = ""
          if current:
              chunks.append(current)

          for index, chunk in enumerate(chunks, start=1):
              suffix = f"\n\n({index}/{len(chunks)})" if len(chunks) > 1 else ""
              send_to_discord(webhook, {"content": chunk + suffix})

          print("Published known issues to Discord")
          PY
