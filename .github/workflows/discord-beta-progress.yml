name: Discord beta progress

on:
  push:
    paths:
      - "vantare-v2/docs/current-plan.md"
      - "vantare-v2/docs/roadmap-execution-board.md"
  workflow_dispatch:

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish beta progress to Discord
        env:
          DISCORD_PROGRESS_WEBHOOK_URL: ${{ secrets.DISCORD_PROGRESS_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_SERVER_URL_VALUE: ${{ github.server_url }}
          GITHUB_REPOSITORY_VALUE: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import sys
          import textwrap
          import urllib.request

          webhook = (os.environ.get("DISCORD_PROGRESS_WEBHOOK_URL") or os.environ.get("DISCORD_WEBHOOK_URL") or "").strip()
          if not webhook:
              print("Neither DISCORD_PROGRESS_WEBHOOK_URL nor DISCORD_WEBHOOK_URL secret is configured", file=sys.stderr)
              sys.exit(1)

          current_plan_path = "vantare-v2/docs/current-plan.md"
          roadmap_path = "vantare-v2/docs/roadmap-execution-board.md"

          if not os.path.exists(current_plan_path):
              print(f"Error: {current_plan_path} does not exist", file=sys.stderr)
              sys.exit(1)
          if not os.path.exists(roadmap_path):
              print(f"Error: {roadmap_path} does not exist", file=sys.stderr)
              sys.exit(1)

          with open(current_plan_path, "r", encoding="utf-8") as fh:
              current_plan = fh.read()

          stable_match = re.search(r"Version estable actual de runtime/build:\s*`([^`]+)`", current_plan)
          if not stable_match:
              print("Error: Could not find stable version in current-plan.md", file=sys.stderr)
              sys.exit(1)
          stable_version = stable_match.group(1).strip()

          checkpoint_match = re.search(r"Ultimo checkpoint de roadmap confirmado:\s*(.+)", current_plan)
          if not checkpoint_match:
              print("Error: Could not find last checkpoint in current-plan.md", file=sys.stderr)
              sys.exit(1)
          last_checkpoint = checkpoint_match.group(1).strip()

          with open(roadmap_path, "r", encoding="utf-8") as fh:
              roadmap = fh.read()

          next_tasks = []
          in_progress_tasks = []

          for line in roadmap.splitlines():
              if line.startswith("|") and not line.strip().startswith("|---"):
                  parts = [p.strip() for p in line.split("|")]
                  if len(parts) >= 5:
                      status = parts[4]
                      task_id = parts[1]
                      minifase = parts[3]
                      
                      if task_id.lower() == "id" or status.lower() == "estado":
                          continue

                      if status == "Next":
                          next_tasks.append(f"{task_id} - {minifase}")
                      elif status == "In progress":
                          in_progress_tasks.append(f"{task_id} - {minifase}")

          next_text = next_tasks[0] if next_tasks else "No hay tareas Next"
          in_progress_text = "\n".join(in_progress_tasks) if in_progress_tasks else "No hay tareas en progreso"

          next_action_match = re.search(
              r"##\s+Pr[oó]xima\s+acci[oó]n\s*\n+([\s\S]*?)(?=\n##\s+|\Z)",
              roadmap,
              re.IGNORECASE
          )
          if not next_action_match:
              print("Error: Could not find Próxima acción block in roadmap-execution-board.md", file=sys.stderr)
              sys.exit(1)
          next_action = next_action_match.group(1).strip()

          repo_url = f"{os.environ['GITHUB_SERVER_URL_VALUE']}/{os.environ['GITHUB_REPOSITORY_VALUE']}"
          sha = os.environ.get("GITHUB_SHA_VALUE", "")[:7]
          commit_url = f"{repo_url}/commit/{sha}"

          message = (
              "**Vantare beta progress**\n\n"
              f"Stable: `{stable_version}`\n"
              f"Checkpoint: {last_checkpoint}\n\n"
              "**Next**\n"
              f"{next_text}\n\n"
              "**In progress**\n"
              f"{in_progress_text}\n\n"
              "**Próxima acción**\n"
              f"{next_action}\n\n"
              f"Commit: [`{sha}`]({commit_url})"
          )

          # Split message if it exceeds 1900 chars
          chunks = []
          current = ""
          for paragraph in message.split("\n\n"):
              candidate = paragraph if not current else current + "\n\n" + paragraph
              if len(candidate) <= 1900:
                  current = candidate
                  continue
              if current:
                  chunks.append(current)
              if len(paragraph) <= 1900:
                  current = paragraph
              else:
                  chunks.extend(textwrap.wrap(paragraph, 1900, replace_whitespace=False))
                  current = ""
          if current:
              chunks.append(current)

          for index, chunk in enumerate(chunks, start=1):
              suffix = f"\n\n({index}/{len(chunks)})" if len(chunks) > 1 else ""
              payload = json.dumps({"content": chunk + suffix}).encode("utf-8")
              req = urllib.request.Request(
                  webhook,
                  data=payload,
                  headers={
                      "Content-Type": "application/json",
                      "User-Agent": "GitHub-Actions-Discord-Announcer",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=20) as resp:
                  if resp.status >= 300:
                      raise RuntimeError(f"Discord webhook failed with status {resp.status}")

          print("Published beta progress to Discord")
          PY
