version: '3'

vars:
  APP_NAME: "vantare"
  BIN_DIR: "bin"
  PACKAGE_MANAGER: 'pnpm'
  VITE_HOST: '{{.WAILS_VITE_HOST | default "127.0.0.1"}}'
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'
  APP_VERSION:
    sh: go run build/sync_version.go -print
  # Public Supabase config injected into the Go binary via ldflags at build
  # time. Sourced from env vars (set by CI or local developer). Empty by
  # default for local dev; the binary then runs in offline-grace mode.
  VANTARE_SUPABASE_URL: '{{.VANTARE_SUPABASE_URL | default ""}}'
  VANTARE_SUPABASE_ANON_KEY: '{{.VANTARE_SUPABASE_ANON_KEY | default ""}}'

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  ios: ./build/ios/Taskfile.yml
  android: ./build/android/Taskfile.yml

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  package:all:
    summary: Reproducible release artifact pipeline (installer + portable zip + checksums + verify)
    desc: |
      R03.B entry point. Runs version:sync -> build -> installer -> portable zip
      -> SHA256 checksums -> version verification.
      Only valid for the Windows OS target.
    platforms: [windows]
    cmds:
      - task: windows:package:all
        vars:
          INSTALL_SCOPE: '{{.INSTALL_SCOPE | default "user"}}'
    vars:
      INSTALL_SCOPE: '{{.INSTALL_SCOPE | default "user"}}'

  release:artifacts:
    summary: Alias of package:all. The canonical R03.B entry point.
    platforms: [windows]
    cmds:
      - task: package:all
        vars:
          INSTALL_SCOPE: '{{.INSTALL_SCOPE | default "user"}}'
    vars:
      INSTALL_SCOPE: '{{.INSTALL_SCOPE | default "user"}}'

  release:portable:
    summary: Builds only the portable zip (no installer)
    platforms: [windows]
    cmds:
      - task: windows:release:portable

  release:checksums:
    summary: Recomputes SHA256 sidecars for the existing artifacts in bin/
    platforms: [windows]
    cmds:
      - task: windows:release:checksums

  release:verify:
    summary: Verifies that every artifact in bin/ embeds the expected VERSION
    platforms: [windows]
    cmds:
      - task: windows:release:verify

  release:clean:
    summary: Removes stale files from bin/ that are not official artifacts
    platforms: [windows]
    cmds:
      - task: windows:release:clean

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    cmds:
      - task: common:setup:docker

  build:server:
    summary: Builds the application in server mode (no GUI, HTTP server only)
    cmds:
      - task: common:build:server

  run:server:
    summary: Runs the application in server mode
    cmds:
      - task: common:run:server

  build:docker:
    summary: Builds a Docker image for server mode deployment
    cmds:
      - task: common:build:docker

  run:docker:
    summary: Builds and runs the Docker image
    cmds:
      - task: common:run:docker

  version:sync:
    summary: Synchronizes the version from VERSION to all config and source files
    cmds:
      - task: common:version:sync
