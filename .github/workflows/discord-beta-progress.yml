name: Discord tester progress

on:
  push:
    branches: [develop]
    paths:
      - "vantare-v2/docs/changelog/fragments/*.json"
  workflow_dispatch:
    inputs:
      base_revision:
        description: "Revision base exclusiva para el dry cut (por defecto HEAD^)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  announce:
    if: github.run_attempt == 1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect canonical tester fragments
        id: fragments
        env:
          BASE_REVISION: ${{ inputs.base_revision }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          base="${BASE_REVISION:-$BEFORE_SHA}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="HEAD^"
          fi
          mapfile -t files < <(git diff --diff-filter=AM --name-only "$base" HEAD -- 'vantare-v2/docs/changelog/fragments/*.json' | grep -v '/schema.json$' || true)
          if [ ${#files[@]} -eq 0 ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          args=()
          for file in "${files[@]}"; do args+=(--fragment "$file"); done
          python .github/scripts/discord_communications.py select-fragments --base "$base" "${args[@]}" > "$RUNNER_TEMP/tester-fragments.txt"
          if [ ! -s "$RUNNER_TEMP/tester-fragments.txt" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Build accessible tester payload and HTML card
        if: steps.fragments.outputs.publish == 'true'
        run: |
          args=()
          while IFS= read -r file; do args+=(--fragment "$file"); done < "$RUNNER_TEMP/tester-fragments.txt"
          python .github/scripts/discord_communications.py testers --dry-run --revision "$GITHUB_SHA" \
            --html-output "$RUNNER_TEMP/vantare-testers.html" "${args[@]}" > "$RUNNER_TEMP/testers-payload-preview.json"

      - name: render-discord-card
        if: steps.fragments.outputs.publish == 'true'
        run: |
          command -v google-chrome >/dev/null 2>&1 || { echo "::error::google-chrome is required"; exit 1; }
          google-chrome --headless=new --disable-gpu --no-sandbox --hide-scrollbars --window-size=1200,630 \
            --screenshot="$RUNNER_TEMP/vantare-testers.png" "file://$RUNNER_TEMP/vantare-testers.html"
          test -s "$RUNNER_TEMP/vantare-testers.png"

      - name: Publish tester card and accessible update
        if: steps.fragments.outputs.publish == 'true'
        env:
          DISCORD_PROGRESS_WEBHOOK_URL: ${{ secrets.DISCORD_PROGRESS_WEBHOOK_URL }}
        run: |
          args=()
          while IFS= read -r file; do args+=(--fragment "$file"); done < "$RUNNER_TEMP/tester-fragments.txt"
          python .github/scripts/discord_communications.py testers --revision "$GITHUB_SHA" \
            --image "$RUNNER_TEMP/vantare-testers.png" "${args[@]}"

      - name: Nothing to publish
        if: steps.fragments.outputs.publish != 'true'
        run: echo "No new canonical tester fragments in this revision range."
