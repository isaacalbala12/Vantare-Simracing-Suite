name: Discord release announcement

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to announce, for example v0.1.0.1"
        required: true
        type: string

permissions:
  contents: read

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Warn on rerun to avoid duplicate Discord messages
        if: github.run_attempt > 1
        run: |
          echo "::warning::Skipping Discord announcement because this is a rerun (run_attempt=${{ github.run_attempt }}). To re-announce, trigger a fresh workflow_dispatch with a distinct tag or delete the previous run."

      - name: Checkout repository
        if: github.run_attempt == 1
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release belongs to master
        if: github.run_attempt == 1
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          tag="${INPUT_TAG:-$REF_NAME}"
          git fetch origin master --no-tags
          tag_commit="$(git rev-list -n 1 "$tag")"
          git merge-base --is-ancestor "$tag_commit" origin/master || {
            echo "::error::Release tag $tag is not contained in origin/master"
            exit 1
          }

      - name: Publish changelog section to Discord
        if: github.run_attempt == 1
        env:
          DISCORD_RELEASE_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_SERVER_URL_VALUE: ${{ github.server_url }}
          GITHUB_REPOSITORY_VALUE: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import sys
          import textwrap
          import time
          import urllib.error
          import urllib.request

          def send_to_discord(webhook, payload_dict):
              """Validate payload and POST to Discord with 429 retry and 403 handling."""
              payload_str = json.dumps(payload_dict)
              # Validate JSON roundtrip before sending
              json.loads(payload_str)

              data = payload_str.encode("utf-8")
              req = urllib.request.Request(
                  webhook,
                  data=data,
                  headers={
                      "Content-Type": "application/json",
                      "User-Agent": "GitHub-Actions-Discord-Announcer",
                  },
                  method="POST",
              )

              def do_request(attempt):
                  try:
                      with urllib.request.urlopen(req, timeout=20) as resp:
                          if resp.status >= 300:
                              raise RuntimeError(f"Discord webhook failed with status {resp.status}")
                          return resp
                  except urllib.error.HTTPError as e:
                      if e.code == 429 and attempt == 1:
                          retry_after = e.headers.get("Retry-After")
                          wait = int(retry_after) if retry_after and retry_after.isdigit() else 5
                          print(f"Discord rate limited (429). Retrying after {wait}s...", file=sys.stderr)
                          time.sleep(wait)
                          return do_request(attempt + 1)
                      if e.code == 403:
                          print("Discord webhook rejected the request (403). Verify the webhook URL secret is correct and the webhook has not been deleted.", file=sys.stderr)
                          sys.exit(1)
                      raise RuntimeError(f"Discord webhook failed with status {e.code}: {e.reason}")
                  except urllib.error.URLError as e:
                      raise RuntimeError(f"Discord webhook request failed: {e.reason}")

              return do_request(1)

          webhook = (os.environ.get("DISCORD_RELEASE_WEBHOOK_URL") or "").strip()
          if not webhook:
              print("DISCORD_RELEASE_WEBHOOK_URL secret is not configured", file=sys.stderr)
              sys.exit(1)

          tag = (os.environ.get("INPUT_TAG") or os.environ.get("REF_NAME") or "").strip()
          if not tag:
              print("No tag provided by workflow_dispatch or github.ref_name", file=sys.stderr)
              sys.exit(1)

          changelog_path = "vantare-v2/docs/changelog.md"
          with open(changelog_path, "r", encoding="utf-8") as fh:
              changelog = fh.read()

          pattern = re.compile(
              rf"^##\s+{re.escape(tag)}\s*$([\s\S]*?)(?=^##\s+v|\Z)",
              re.MULTILINE,
          )
          match = pattern.search(changelog)
          if not match:
              print(f"Could not find changelog section for {tag}", file=sys.stderr)
              sys.exit(1)

          section = match.group(1).strip()
          if not section:
              print(f"Changelog section for {tag} is empty", file=sys.stderr)
              sys.exit(1)

          repo_url = f"{os.environ['GITHUB_SERVER_URL_VALUE']}/{os.environ['GITHUB_REPOSITORY_VALUE']}"
          tag_url = f"{repo_url}/releases/tag/{tag}"
          sha = os.environ.get("GITHUB_SHA_VALUE", "")[:7]

          header = f"**Vantare {tag}**\n{tag_url}\nCommit: `{sha}`\n\n"
          content = header + section

          # Discord message content limit is 2000 chars. Split on paragraph
          # boundaries so long changelogs still publish instead of failing.
          chunks = []
          current = ""
          for paragraph in content.split("\n\n"):
              candidate = paragraph if not current else current + "\n\n" + paragraph
              if len(candidate) <= 1900:
                  current = candidate
                  continue
              if current:
                  chunks.append(current)
              if len(paragraph) <= 1900:
                  current = paragraph
              else:
                  chunks.extend(textwrap.wrap(paragraph, 1900, replace_whitespace=False))
                  current = ""
          if current:
              chunks.append(current)

          for index, chunk in enumerate(chunks, start=1):
              suffix = f"\n\n({index}/{len(chunks)})" if len(chunks) > 1 else ""
              send_to_discord(webhook, {"content": chunk + suffix})

          print(f"Published changelog for {tag} to Discord")
          PY
