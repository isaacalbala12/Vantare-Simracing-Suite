version: '3'

includes:
  common: ../Taskfile.yml

vars:
  # Signing configuration - edit these values for your project
  # SIGN_CERTIFICATE: "path/to/certificate.pfx"
  # SIGN_THUMBPRINT: "certificate-thumbprint"  # Alternative to SIGN_CERTIFICATE
  # TIMESTAMP_SERVER: "http://timestamp.digicert.com"
  #
  # Password is stored securely in system keychain. Run: wails3 setup signing

  # Docker image for cross-compilation with CGO (used when CGO_ENABLED=1 on non-Windows)
  CROSS_IMAGE: wails-cross

tasks:
  build:
    summary: Builds the application for Windows
    cmds:
      # Auto-detect CGO: if CGO_ENABLED=1, use Docker; otherwise use native Go cross-compile
      - task: '{{if and (ne OS "windows") (eq .CGO_ENABLED "1")}}build:docker{{else}}build:native{{end}}'
        vars:
          ARCH: '{{.ARCH}}'
          DEV: '{{.DEV}}'
          EXTRA_TAGS: '{{.EXTRA_TAGS}}'
          OBFUSCATED: '{{.OBFUSCATED}}'
          GARBLE_ARGS: '{{.GARBLE_ARGS}}'
    vars:
      # Default to CGO_ENABLED=0 if not explicitly set
      CGO_ENABLED: '{{.CGO_ENABLED | default "0"}}'

  build:native:
    summary: Builds the application using native Go cross-compilation
    internal: true
    deps:
      - task: common:version:sync
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
          OBFUSCATED:
            ref: .OBFUSCATED
          DEV:
            ref: .DEV
      - task: common:generate:icons
    preconditions:
      - sh: '{{if eq .OBFUSCATED "true"}}command -v garble >/dev/null 2>&1{{else}}true{{end}}'
        msg: "garble is required for obfuscated builds. Install it with: go install mvdan.cc/garble@v0.16.0 (requires Go 1.24+). See https://github.com/burrowers/garble/releases for version/toolchain compatibility."
    cmds:
      - task: generate:syso
        vars:
          ARCH: '{{.ARCH}}'
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File "{{.ROOT_DIR}}\tools\generate_supabase_config.ps1" -OutFile "{{.ROOT_DIR}}\cmd\vantare\supabase_build.go"
      - '{{if eq .OBFUSCATED "true"}}garble {{.GARBLE_ARGS}} build{{else}}go build{{end}} {{.BUILD_FLAGS}} -o "{{.BIN_DIR}}/{{.APP_NAME}}.exe" ./cmd/vantare'
      - cmd: powershell Remove-item wails_windows_amd64.syso -ErrorAction SilentlyContinue
      - cmd: rm -f wails_windows_amd64.syso
        platforms: [linux, darwin]
      - cmd: powershell Remove-item cmd/vantare/supabase_build.go -ErrorAction SilentlyContinue
    vars:
      BUILD_FLAGS: '{{if eq .DEV "true"}}{{if or .EXTRA_TAGS (eq .OBFUSCATED "true")}}-tags {{if eq .OBFUSCATED "true"}}wails_obfuscated{{if .EXTRA_TAGS}},{{end}}{{end}}{{.EXTRA_TAGS}} {{end}}-buildvcs=false -gcflags=all="-l"{{else}}-tags production{{if eq .OBFUSCATED "true"}},wails_obfuscated{{end}}{{if .EXTRA_TAGS}},{{.EXTRA_TAGS}}{{end}} -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui -X main.version=v{{.APP_VERSION}}"{{end}}'
    env:
      GOOS: windows
      CGO_ENABLED: '{{.CGO_ENABLED | default "0"}}'
      GOARCH: '{{.ARCH | default ARCH}}'

  build:docker:
    summary: Cross-compiles for Windows using Docker with Zig (for CGO builds on non-Windows)
    internal: true
    deps:
      - task: common:build:frontend
        vars:
          OBFUSCATED:
            ref: .OBFUSCATED
      - task: common:generate:icons
    preconditions:
      - sh: docker info > /dev/null 2>&1
        msg: "Docker is required for CGO cross-compilation. Please install Docker."
      - sh: docker image inspect {{.CROSS_IMAGE}} > /dev/null 2>&1
        msg: |
          Docker image '{{.CROSS_IMAGE}}' not found.
          Build it first: wails3 task setup:docker
    cmds:
      - task: generate:syso
        vars:
          ARCH: '{{.ARCH}}'
      - docker run --rm -v "{{.ROOT_DIR}}:/app" {{.DOCKER_MOUNTS}} -e APP_NAME="{{.APP_NAME}}" {{if .EXTRA_TAGS}}-e EXTRA_TAGS="{{.EXTRA_TAGS}}"{{end}} {{if eq .OBFUSCATED "true"}}-e OBFUSCATED=true{{end}} {{if .GARBLE_ARGS}}-e GARBLE_ARGS="{{.GARBLE_ARGS}}"{{end}} {{.CROSS_IMAGE}} windows {{.DOCKER_ARCH}}
      - cmd: docker run --rm -v "{{.ROOT_DIR}}:/app" alpine chown -R $(id -u):$(id -g) /app/bin
        platforms: [linux, darwin]
      - rm -f *.syso
    vars:
      DOCKER_ARCH: '{{.ARCH | default "amd64"}}'
      # Generate Docker volume mounts: Go module cache + go.mod replace directives
      # Uses wails3 tool docker-mounts for cross-platform compatibility (Windows/Linux/macOS)
      DOCKER_MOUNTS:
        sh: 'wails3 tool docker-mounts'

  package:
    summary: Packages the application
    cmds:
      - task: '{{if eq (.FORMAT | default "nsis") "msix"}}create:msix:package{{else}}create:nsis:installer{{end}}'
        vars:
          INSTALL_SCOPE: '{{.INSTALL_SCOPE | default "machine"}}'
    vars:
      FORMAT: '{{.FORMAT | default "nsis"}}'
      INSTALL_SCOPE: '{{.INSTALL_SCOPE | default "machine"}}'

  generate:syso:
    summary: Generates Windows `.syso` file
    dir: build
    cmds:
      - wails3 generate syso -arch {{.ARCH}} -icon windows/icon.ico -manifest windows/wails.exe.manifest -info windows/info.json -out ../wails_windows_{{.ARCH}}.syso
    vars:
      ARCH: '{{.ARCH | default ARCH}}'

  create:nsis:installer:
    summary: Creates an NSIS installer
    dir: build/windows/nsis
    deps:
      - task: build
    preconditions:
      - sh: '[ "{{.INSTALL_SCOPE}}" = "user" ] || [ "{{.INSTALL_SCOPE}}" = "machine" ]'
        msg: "INSTALL_SCOPE must be 'user' or 'machine', got '{{.INSTALL_SCOPE}}'"
    cmds:
      # Create the Microsoft WebView2 bootstrapper if it doesn't exist
      - wails3 generate webview2bootstrapper -dir "{{.ROOT_DIR}}/build/windows/nsis"
      - |
        {{if eq OS "windows"}}
        makensis {{if eq .INSTALL_SCOPE "user"}}-DWAILS_INSTALL_SCOPE=user -DREQUEST_EXECUTION_LEVEL=user {{end}}-DARG_WAILS_{{.ARG_FLAG}}_BINARY="{{.ROOT_DIR}}\{{.BIN_DIR}}\{{.APP_NAME}}.exe" project.nsi
        {{else}}
        makensis {{if eq .INSTALL_SCOPE "user"}}-DWAILS_INSTALL_SCOPE=user -DREQUEST_EXECUTION_LEVEL=user {{end}}-DARG_WAILS_{{.ARG_FLAG}}_BINARY="{{.ROOT_DIR}}/{{.BIN_DIR}}/{{.APP_NAME}}.exe" project.nsi
        {{end}}
    vars:
      ARCH: '{{.ARCH | default ARCH}}'
      ARG_FLAG: '{{if eq .ARCH "amd64"}}AMD64{{else}}ARM64{{end}}'
      INSTALL_SCOPE: '{{.INSTALL_SCOPE | default "machine"}}'

  package:all:
    summary: Reproducible release artifact pipeline (installer + portable zip + checksums + verify).
    desc: |
      Runs the full R03.B release artifact pipeline for Windows:
        1. wails3 generate webview2bootstrapper
        2. NSIS installer via the script tools/build_nsis.ps1
              -> bin/vantare-amd64-installer.exe
        3. release_artifacts.ps1 portable-zip
              -> bin/vantare-portable-amd64.zip (with configs/ + tester README)
        4. release_artifacts.ps1 sha256
              -> <artifact>.sha256 for installer, portable zip and portable exe
        5. release_artifacts.ps1 verify
              -> checks that every artifact embeds the expected VERSION
      The NSIS call is delegated to a script so that the real NSIS binary at
      C:\Program Files (x86)\NSIS\Bin\makensis.exe can be used when the
      Wails3 makensis shim is unavailable or misconfigured on the host.
    preconditions:
      - sh: '[ -f "{{.BIN_DIR}}/vantare.exe" ]'
        msg: "Run 'task build' first (or 'task package:all' which builds)."
    deps:
      - task: build
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File "{{.ROOT_DIR}}\tools\build_nsis.ps1" -RepoRoot "{{.ROOT_DIR}}" -BinDir "{{.BIN_DIR}}" -AppName "{{.APP_NAME}}"
      - powershell -NoProfile -ExecutionPolicy Bypass -File "{{.ROOT_DIR}}\tools\release_artifacts.ps1" -Operation all -RepoRoot "{{.ROOT_DIR}}" -BinDir "{{.BIN_DIR}}"
    vars:
      INSTALL_SCOPE: '{{.INSTALL_SCOPE | default "user"}}'

  release:portable:
    summary: Builds the portable zip artifact (no installer, no checksum).
    desc: |
      Produces bin/vantare-portable-amd64.zip with vantare.exe, the embedded
      configs/*.json profiles and docs/tester-build-instructions.md as docs/README.txt.
      Intended for testers who do not want a Windows installer.
    deps:
      - task: build
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File "{{.ROOT_DIR}}\tools\release_artifacts.ps1" -Operation portable-zip -RepoRoot "{{.ROOT_DIR}}" -BinDir "{{.BIN_DIR}}"

  release:checksums:
    summary: Writes SHA256 sidecars for the official release artifacts.
    desc: |
      Reads bin/vantare-amd64-installer.exe, bin/vantare-portable-amd64.zip and
      bin/vantare.exe and writes a <artifact>.sha256 file alongside each one,
      using certutil.exe (always present on Windows; the script avoids Get-FileHash
      so it also works in constrained PowerShell hosts).
      Standalone so it can be re-run after a manual edit of bin/ without rebuilding.
    preconditions:
      - sh: '[ -f "{{.BIN_DIR}}/vantare-amd64-installer.exe" ] && [ -f "{{.BIN_DIR}}/vantare-portable-amd64.zip" ] && [ -f "{{.BIN_DIR}}/vantare.exe" ]'
        msg: "Run 'task windows:package:all' first to generate installer, portable zip and vantare.exe."
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File "{{.ROOT_DIR}}\tools\release_artifacts.ps1" -Operation sha256 -RepoRoot "{{.ROOT_DIR}}" -BinDir "{{.BIN_DIR}}"

  release:verify:
    summary: Verifies that every official artifact embeds the expected VERSION.
    desc: |
      Scans the official release artifacts and confirms the version token
      'v<VERSION>' is present in the embedded strings. Catches the common bug
      of publishing a stale installer built before version:sync was run.
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File "{{.ROOT_DIR}}\tools\release_artifacts.ps1" -Operation verify -RepoRoot "{{.ROOT_DIR}}" -BinDir "{{.BIN_DIR}}"

  release:clean:
    summary: Removes stale or temporary files from bin/ that are not official artifacts.
    desc: |
      Removes any file in bin/ that is not one of the official artifacts
      (vantare.exe, vantare-amd64-installer.exe, vantare-portable-amd64.zip
      and their .sha256 sidecars). Intended to be run before publishing
      a new build so old binaries don't ship accidentally.
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File "{{.ROOT_DIR}}\tools\release_artifacts.ps1" -Operation clean-stale -RepoRoot "{{.ROOT_DIR}}" -BinDir "{{.BIN_DIR}}"

  create:msix:package:
    summary: Creates an MSIX package
    deps:
      - task: build
    cmds:
      - |-
        wails3 tool msix \
          --config "{{.ROOT_DIR}}/wails.json" \
          --name "{{.APP_NAME}}" \
          --executable "{{.ROOT_DIR}}/{{.BIN_DIR}}/{{.APP_NAME}}.exe" \
          --arch "{{.ARCH}}" \
          --out "{{.ROOT_DIR}}/{{.BIN_DIR}}/{{.APP_NAME}}-{{.ARCH}}.msix" \
          {{if .CERT_PATH}}--cert "{{.CERT_PATH}}"{{end}} \
          {{if .PUBLISHER}}--publisher "{{.PUBLISHER}}"{{end}} \
          {{if .USE_MSIX_TOOL}}--use-msix-tool{{else}}--use-makeappx{{end}}
    vars:
      ARCH: '{{.ARCH | default ARCH}}'
      CERT_PATH: '{{.CERT_PATH | default ""}}'
      PUBLISHER: '{{.PUBLISHER | default ""}}'
      USE_MSIX_TOOL: '{{.USE_MSIX_TOOL | default "false"}}'

  install:msix:tools:
    summary: Installs tools required for MSIX packaging
    cmds:
      - wails3 tool msix-install-tools

  run:
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}.exe'

  sign:
    summary: Signs the Windows executable
    desc: |
      Signs the .exe with an Authenticode certificate.
      Configure SIGN_CERTIFICATE or SIGN_THUMBPRINT in the vars section at the top of this file.
      Password is retrieved from system keychain (run: wails3 setup signing)
    deps:
      - task: build
    cmds:
      - wails3 tool sign --input "{{.BIN_DIR}}/{{.APP_NAME}}.exe" {{if .SIGN_CERTIFICATE}}--certificate {{.SIGN_CERTIFICATE}}{{end}} {{if .SIGN_THUMBPRINT}}--thumbprint {{.SIGN_THUMBPRINT}}{{end}} {{if .TIMESTAMP_SERVER}}--timestamp {{.TIMESTAMP_SERVER}}{{end}}
    preconditions:
      - sh: '[ -n "{{.SIGN_CERTIFICATE}}" ] || [ -n "{{.SIGN_THUMBPRINT}}" ]'
        msg: "Either SIGN_CERTIFICATE or SIGN_THUMBPRINT is required. Set it in the vars section at the top of build/windows/Taskfile.yml"

  sign:installer:
    summary: Signs the NSIS installer
    desc: |
      Creates and signs the NSIS installer.
      Configure SIGN_CERTIFICATE or SIGN_THUMBPRINT in the vars section at the top of this file.
      Password is retrieved from system keychain (run: wails3 setup signing)
    deps:
      - task: create:nsis:installer
        vars:
          INSTALL_SCOPE: '{{.INSTALL_SCOPE | default "machine"}}'
    vars:
      INSTALL_SCOPE: '{{.INSTALL_SCOPE | default "machine"}}'
    cmds:
      - wails3 tool sign --input "build/windows/nsis/{{.APP_NAME}}-installer.exe" {{if .SIGN_CERTIFICATE}}--certificate {{.SIGN_CERTIFICATE}}{{end}} {{if .SIGN_THUMBPRINT}}--thumbprint {{.SIGN_THUMBPRINT}}{{end}} {{if .TIMESTAMP_SERVER}}--timestamp {{.TIMESTAMP_SERVER}}{{end}}
    preconditions:
      - sh: '[ -n "{{.SIGN_CERTIFICATE}}" ] || [ -n "{{.SIGN_THUMBPRINT}}" ]'
        msg: "Either SIGN_CERTIFICATE or SIGN_THUMBPRINT is required. Set it in the vars section at the top of build/windows/Taskfile.yml"
