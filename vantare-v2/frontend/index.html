<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vantare</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
      (function () {
        var isObsOverlay = window.location.pathname.indexOf("/overlay") === 0 || window.location.search.indexOf("obs=1") !== -1;
        var isHub = window.location.hash.indexOf("#/hub") === 0;
        if (isObsOverlay || !isHub) {
          document.documentElement.classList.add("desktop-overlay", "desktop-overlay-boot");
          document.body.classList.add("desktop-overlay");
          var root = document.getElementById("root");
          if (root) root.classList.add("desktop-overlay");
        }
      })();
    </script>
    <style>
      html.desktop-overlay,
      html.desktop-overlay body,
      html.desktop-overlay #root,
      body.desktop-overlay,
      #root.desktop-overlay {
        background: transparent !important;
        background-color: transparent !important;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
