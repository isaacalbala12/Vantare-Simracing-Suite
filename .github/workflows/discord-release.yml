name: Discord release announcement

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to announce, for example v0.1.0.1"
        required: true
        type: string

permissions:
  contents: read

jobs:
  announce:
    if: github.run_attempt == 1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release belongs to master and extract changelog
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          tag="${INPUT_TAG:-$REF_NAME}"
          git fetch origin master --no-tags
          tag_commit="$(git rev-list -n 1 "$tag")"
          git merge-base --is-ancestor "$tag_commit" origin/master || { echo "::error::$tag is not contained in origin/master"; exit 1; }
          python - "$tag" "$RUNNER_TEMP/release-section.md" <<'PY'
          import pathlib, re, sys
          tag, output = sys.argv[1:]
          changelog = pathlib.Path("vantare-v2/docs/changelog.md").read_text(encoding="utf-8")
          match = re.search(rf"^##\s+{re.escape(tag)}\s*$([\s\S]*?)(?=^##\s+v|\Z)", changelog, re.MULTILINE)
          if not match or not match.group(1).strip():
              raise SystemExit(f"Missing changelog section for {tag}")
          pathlib.Path(output).write_text(match.group(1).strip(), encoding="utf-8")
          PY
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "url=$SERVER_URL/$REPOSITORY/releases/tag/$tag" >> "$GITHUB_OUTPUT"

      - name: Build accessible payload and HTML card
        run: |
          python .github/scripts/discord_communications.py release --dry-run \
            --tag "${{ steps.release.outputs.tag }}" --section-file "$RUNNER_TEMP/release-section.md" \
            --release-url "${{ steps.release.outputs.url }}" --revision "$GITHUB_SHA" \
            --html-output "$RUNNER_TEMP/vantare-release.html" > "$RUNNER_TEMP/release-payload-preview.json"

      - name: render-discord-card
        run: |
          command -v google-chrome >/dev/null 2>&1 || { echo "::error::google-chrome is required"; exit 1; }
          google-chrome --headless=new --disable-gpu --no-sandbox --hide-scrollbars --window-size=1200,630 \
            --screenshot="$RUNNER_TEMP/vantare-release.png" "file://$RUNNER_TEMP/vantare-release.html"
          test -s "$RUNNER_TEMP/vantare-release.png"

      - name: Publish release card and accessible changelog
        env:
          DISCORD_RELEASE_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
        run: |
          python .github/scripts/discord_communications.py release \
            --tag "${{ steps.release.outputs.tag }}" --section-file "$RUNNER_TEMP/release-section.md" \
            --release-url "${{ steps.release.outputs.url }}" --revision "$GITHUB_SHA" \
            --image "$RUNNER_TEMP/vantare-release.png"
